<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Call of Magic</title>

<!-- GOOGLE LOGIN SDK -->
<script src="https://accounts.google.com/gsi/client"
async defer></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,
    #312e81 0%,
    #0f172a 50%,
    #020617 100%);

    color:white;
}

.container{
    width:340px;

    background:rgba(15,23,42,0.96);

    padding:30px;

    border-radius:25px;

    box-shadow:
    0 0 30px rgba(0,0,0,0.6);
}

.title{
    text-align:center;

    font-size:34px;

    font-weight:bold;

    margin-bottom:25px;

    color:#c084fc;

    text-shadow:
    0 0 15px rgba(192,132,252,0.7);
}

.form-box{
    display:none;
}

.form-box.active{
    display:block;
}

input{
    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:14px;

    background:#1e293b;

    color:white;

    font-size:15px;
}

input:focus{
    outline:none;

    border:2px solid #a855f7;
}

.login-btn{
    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(to right,
    #7c3aed,
    #a855f7);

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{
    transform:scale(1.02);
}

.switch{
    text-align:center;

    margin-top:18px;

    color:#cbd5e1;
}

.switch span{
    color:#c084fc;

    cursor:pointer;

    font-weight:bold;
}

.message{
    margin-top:18px;

    text-align:center;

    color:#22c55e;
}

.or{
    text-align:center;

    margin:18px 0;

    color:#94a3b8;
}

/* GOOGLE BUTTON */

.google-btn{
    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:white;

    color:#111827;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    transition:0.3s;
}

.google-btn:hover{
    transform:scale(1.02);
}

.google-logo{
    width:22px;
    height:22px;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        Call of Magic
    </div>

    <!-- LOGIN -->

    <div class="form-box active"
    id="loginForm">

        <input type="text"
        id="loginUser"
        placeholder="Username">

        <input type="password"
        id="loginPass"
        placeholder="Password">

        <button class="login-btn"
        onclick="login()">

            Login

        </button>

        <div class="or">OR</div>

        <!-- GOOGLE BUTTON -->

        <button class="google-btn"
        onclick="googleLogin()">

            <!-- GOOGLE SVG -->

            <svg class="google-logo"
            viewBox="0 0 48 48">

                <path fill="#FFC107"
                d="M43.6 20.5H42V20H24v8h11.3
                C33.7 32.7 29.3 36 24 36
                c-6.6 0-12-5.4-12-12
                s5.4-12 12-12
                c3 0 5.7 1.1 7.8 3
                l5.7-5.7
                C34.1 6.1 29.3 4 24 4
                12.9 4 4 12.9 4 24
                s8.9 20 20 20
                20-8.9 20-20
                c0-1.3-.1-2.4-.4-3.5z"/>

                <path fill="#FF3D00"
                d="M6.3 14.7l6.6 4.8
                C14.7 16 19 12 24 12
                c3 0 5.7 1.1 7.8 3
                l5.7-5.7
                C34.1 6.1 29.3 4 24 4
                16.3 4 9.7 8.3 6.3 14.7z"/>

                <path fill="#4CAF50"
                d="M24 44
                c5.2 0 10-2 13.5-5.2
                l-6.2-5.2
                c-2.1 1.5-4.7 2.4-7.3 2.4
                -5.3 0-9.8-3.3-11.4-8
                l-6.5 5
                C9.5 39.5 16.2 44 24 44z"/>

                <path fill="#1976D2"
                d="M43.6 20.5H42V20H24v8h11.3
                c-1.1 3-3.1 5.4-5.8 7
                l6.2 5.2
                C39.2 36.7 44 31 44 24
                c0-1.3-.1-2.4-.4-3.5z"/>
            </svg>

            Log in with Google

        </button>

        <div class="switch">

            No account?

            <span onclick="showRegister()">

                Register

            </span>

        </div>

    </div>

    <!-- REGISTER -->

    <div class="form-box"
    id="registerForm">

        <input type="text"
        id="registerUser"
        placeholder="Create Username">

        <input type="password"
        id="registerPass"
        placeholder="Create Password">

        <button class="login-btn"
        onclick="register()">

            Register

        </button>

        <div class="switch">

            Already have an account?

            <span onclick="showLogin()">

                Login

            </span>

        </div>

    </div>

    <div class="message"
    id="message"></div>

</div>

<script>

/* GOOGLE INIT */

window.onload = function(){

    google.accounts.id.initialize({

        client_id:
        "YOUR_GOOGLE_CLIENT_ID",

        callback:
        handleCredentialResponse
    });
};

/* GOOGLE BUTTON CLICK */

function googleLogin(){

    google.accounts.id.prompt();
}

/* GOOGLE SUCCESS */

function handleCredentialResponse(response){

    document.getElementById("message")
    .innerText =
    "Google Login Successful!";

    console.log(response);

    // TOKEN:
    console.log(response.credential);
}

/* SWITCH FORMS */

function showRegister(){

    document.getElementById("loginForm")
    .classList.remove("active");

    document.getElementById("registerForm")
    .classList.add("active");
}

function showLogin(){

    document.getElementById("registerForm")
    .classList.remove("active");

    document.getElementById("loginForm")
    .classList.add("active");
}

/* REGISTER */

function register(){

    let user =
    document.getElementById("registerUser").value;

    let pass =
    document.getElementById("registerPass").value;

    if(user === "" || pass === ""){

        document.getElementById("message")
        .innerText =
        "Please fill all fields";

        return;
    }

    localStorage.setItem("username", user);

    localStorage.setItem("password", pass);

    document.getElementById("message")
    .innerText =
    "Registration successful!";

    showLogin();
}

/* LOGIN */

function login(){

    let user =
    document.getElementById("loginUser").value;

    let pass =
    document.getElementById("loginPass").value;

    let savedUser =
    localStorage.getItem("username");

    let savedPass =
    localStorage.getItem("password");

    if(user === savedUser &&
       pass === savedPass){

        document.getElementById("message")
        .innerText =
        "Login successful!";

    }else{

        document.getElementById("message")
        .innerText =
        "Wrong username or password";
    }
}

YOUR_GOOGLE_CLIENT_ID

</script>

</body>
</html>
